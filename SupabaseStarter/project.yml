name: SupabaseStarter
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  SupabaseStarter:
    type: application
    platform: iOS
    sources:
      - SupabaseStarter
    settings:
      base:
        INFOPLIST_FILE: SupabaseStarter/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.SupabaseStarter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
    resources:
      - path: SupabaseStarter/Assets.xcassets
